name: astrbot_plugin_silent_response # 插件唯一识别名，以 astrbot_plugin_ 前缀开头
display_name: 沉默以应[APSR] # 用于展示的名字，可以是方便人类阅读的名字（需要版本 >= v4.5.0，低版本不会报错，请放心填写）
desc: 为AI赋予“沉默权”。由AI自行判断话题边界，在用户不礼貌、对话自然结束或内容无意义时，通过输出特定内容（如[SILENCE]）触发插件函数吞掉回复，以达到不回复用户的效果，彻底避免无限复读与尬聊。
version: v1.0.0 # 插件版本号。格式：v1.1.1 或者 v1.1
author: olozhika # 作者
repo: https://github.com/olozhika/astrbot_plugin_silent_response # 插件的仓库地址
